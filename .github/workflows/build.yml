name: Autonomous Game Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  detect-project:
    runs-on: ubuntu-latest
    outputs:
      project_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v3

      - name: Detect CMake project
        id: check
        run: |
          if [ -f "CMakeLists.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build-windows:

    needs: detect-project
    if: needs.detect-project.outputs.project_exists == 'true'

    runs-on: windows-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Configure
        run: cmake -S . -B build

      - name: Compile
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir release
          copy build/Release/*.exe release/

      - name: Copy Assets
        run: |
          xcopy Assets release\Assets /E /I

      - name: Zip Build
        run: |
          powershell Compress-Archive release GameBuild.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: GameBuild
          path: GameBuild.zip
