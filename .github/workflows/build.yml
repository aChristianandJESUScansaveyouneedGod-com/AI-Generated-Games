name: Autonomous Game Factory Build

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:

  detect-projects:

    runs-on: ubuntu-latest

    outputs:
      projects_found: ${{ steps.detect.outputs.projects }}

    steps:

      - uses: actions/checkout@v4

      - name: Detect game projects
        id: detect
        run: |

          count=0

          for dir in Projects/*; do
            if [ -f "$dir/CMakeLists.txt" ]; then
              echo "Found project: $dir"
              count=$((count+1))
            fi
          done

          echo "projects=$count" >> $GITHUB_OUTPUT


  build-windows:

    needs: detect-projects

    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Create release directory
        run: mkdir releases

      - name: Build all game projects
        shell: bash
        run: |

          for dir in Projects/*; do

            if [ -f "$dir/CMakeLists.txt" ]; then

              echo "Building $dir"

              cmake -S "$dir" -B "$dir/build"

              cmake --build "$dir/build" --config Release

            fi

          done

      - name: Collect executables
        shell: bash
        run: |

          for dir in Projects/*; do

            if [ -d "$dir/build/Release" ]; then

              cp "$dir/build/Release/"*.exe releases/ || true

            fi

          done

      - name: Copy shared assets
        shell: bash
        run: |

          if [ -d Assets ]; then
            cp -r Assets releases/Assets
          fi

      - name: Zip builds
        shell: pwsh
        run: |
          Compress-Archive releases GameBuild.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameBuild
          path: GameBuild.zip
